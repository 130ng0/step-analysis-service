services:
  step-analysis-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: step-analysis-service
    restart: unless-stopped
    ports:
      - "5050:8080"
    environment:
      STEP_SERVICE_API_KEY: "${STEP_SERVICE_API_KEY}"
      MAX_FILE_SIZE_MB: "100"

  orca-worker:
    build:
      context: .
      dockerfile: orca-worker/Dockerfile
    container_name: orca-worker
    restart: unless-stopped